{% extends 'base.html' %}
{% block content %}
<style>
    .form-card {
        background: white; border-radius: 10px; padding: 36px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .form-card h1 { color: #2c3e50; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; }
    input[type=text], textarea {
        width: 100%; padding: 12px; border: 1px solid #ddd;
        border-radius: 6px; font-size: 1rem; margin-bottom: 20px;
        font-family: inherit;
    }
    textarea { height: 200px; resize: vertical; }
    button[type=submit] {
        background: #27ae60; color: white; border: none;
        padding: 12px 28px; border-radius: 6px; font-size: 1rem; cursor: pointer;
    }
    button[type=submit]:hover { background: #219a52; }
</style>

<div class="form-card">
    <h1>✏️ New Blog Post</h1>
    <form method="POST">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Enter post title..." required>

        <label for="content">Content</label>
        <textarea id="content" name="content" placeholder="Write your post here..." required></textarea>

        <button type="submit">Publish Post</button>
    </form>
</div>
{% endblock %}
